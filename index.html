<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENTJ</title>
  <meta name="description" content="ENTJ 개인 생산성 기록 앱" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="ENTJ" />
  <meta property="og:description" content="ENTJ 개인 생산성 기록 앱" />
  <meta property="og:url" content="https://entj-murex.vercel.app/" />
  <meta property="og:site_name" content="ENTJ" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="ENTJ" />
  <meta name="twitter:description" content="ENTJ 개인 생산성 기록 앱" />
  <link rel="stylesheet" href="/src/styles/style.css" />
</head>

<body class="auth-loading">

  <section class="auth-screen" id="authScreen">
    <div class="auth-card">
      <div class="auth-logo">✓</div>
      <h1>ENTJ</h1>
      <p>Google 계정으로 로그인하면 내 기록을 어디서든 이어서 볼 수 있어요.</p>
      <button class="google-login-btn" id="googleLoginBtn" type="button" disabled>
        <span class="google-icon">G</span>
        Google로 계속하기
      </button>
      <p class="auth-message" id="authMessage">로그인 상태를 확인하는 중…</p>
    </div>
  </section>

  <header>
    <div class="header-top">
      <div class="date-display" id="dateDisplay">로딩 중…</div>
      <div class="motto-wrap">
        <span class="motto-label">나의 좌우명</span>
        <span class="motto-text placeholder" id="mottoDisplay" title="클릭해서 편집">좌우명을 입력하세요</span>
      </div>
      <div class="user-menu">
        <button class="logout-btn" id="logoutBtn" type="button">로그아웃</button>
      </div>
    </div>
    <nav class="tabs" id="tabsNav"></nav>
  </header>

  <main id="tabPanels"></main>

  <!-- ── 모달: To Do 추가 ── -->
  <div class="modal-overlay" id="todoModal">
    <div class="modal">
      <h3>할 일 추가</h3>
      <input type="text" id="todoInput" placeholder="오늘 할 일을 입력하세요" maxlength="80" />
      <div class="modal-actions">
        <button class="btn-cancel" id="todoCancelBtn">취소</button>
        <button class="btn-confirm" id="todoConfirmBtn">추가</button>
      </div>
    </div>
  </div>

  <!-- ── 모달: 매일 할 목록 추가 ── -->
  <div class="modal-overlay" id="dailyModal">
    <div class="modal">
      <h3>매일 할 항목 추가</h3>
      <input type="text" id="dailyInput" placeholder="예: 독서 30분, 운동, 물 2L 마시기" maxlength="80" />
      <div class="modal-actions">
        <button class="btn-cancel" id="dailyCancelBtn">취소</button>
        <button class="btn-confirm" id="dailyConfirmBtn">추가</button>
      </div>
    </div>
  </div>

  <!-- ── 모달: 목표 추가 ── -->
  <div class="modal-overlay" id="goalModal">
    <div class="modal">
      <h3>목표 추가</h3>
      <textarea id="goalInput" placeholder="이루고 싶은 목표를 적어보세요" maxlength="200" rows="3"></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" id="goalCancelBtn">취소</button>
        <button class="btn-confirm" id="goalConfirmBtn">추가</button>
      </div>
    </div>
  </div>

  <!-- ── 모달: 아이디어 추가 ── -->
  <div class="modal-overlay" id="ideaModal">
    <div class="modal">
      <h3>아이디어 추가</h3>
      <textarea id="ideaInput" placeholder="떠오른 아이디어를 적어보세요" maxlength="300" rows="3"></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" id="ideaCancelBtn">취소</button>
        <button class="btn-confirm" id="ideaConfirmBtn">추가</button>
      </div>
    </div>
  </div>

  <!-- ── 모달: 운동 기록 추가 ── -->
  <div class="modal-overlay" id="exerciseModal">
    <div class="modal">
      <h3>운동 추가</h3>
      <input type="text" id="exerciseNameInput" placeholder="운동 이름" maxlength="50" />
      <div class="modal-actions">
        <button class="btn-cancel" id="exerciseCancelBtn">취소</button>
        <button class="btn-confirm" id="exerciseConfirmBtn">추가</button>
      </div>
    </div>
  </div>

  <!-- ── 모달: 탭 편집 ── -->
  <div class="modal-overlay" id="tabSettingsModal">
    <div class="modal">
      <h3>탭 편집</h3>
      <div class="tab-settings-list" id="tabSettingsList"></div>
      <div class="new-tab-row">
        <input type="text" id="newTabInput" placeholder="새 탭 이름" maxlength="24" />
        <button class="btn-confirm" id="newTabConfirmBtn" type="button">추가</button>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="tabSettingsCancelBtn" type="button">닫기</button>
        <button class="btn-confirm" id="tabSettingsDoneBtn" type="button">완료</button>
      </div>
    </div>
  </div>

  <!-- ── 모달: 블록 템플릿 ── -->
  <div class="modal-overlay" id="componentTemplateModal">
    <div class="modal">
      <h3>블록 추가</h3>
      <div class="component-template-list" id="componentTemplateList"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="componentTemplateCancelBtn" type="button">취소</button>
      </div>
    </div>
  </div>

  <!-- ── 모달: 블록 항목 추가 ── -->
  <div class="modal-overlay" id="blockItemModal">
    <div class="modal">
      <h3>할 일 추가</h3>
      <input type="text" id="blockItemInput" placeholder="오늘 할 일을 입력하세요" maxlength="80" />
      <div class="modal-actions">
        <button class="btn-cancel" id="blockItemCancelBtn" type="button">취소</button>
        <button class="btn-confirm" id="blockItemConfirmBtn" type="button">추가</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>

</body>

</html>
