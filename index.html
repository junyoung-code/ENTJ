<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENTJ</title>
  <meta name="description" content="ENTJ 개인 생산성 기록 앱" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="ENTJ" />
  <meta property="og:description" content="ENTJ 개인 생산성 기록 앱" />
  <meta property="og:url" content="https://entj-murex.vercel.app/" />
  <meta property="og:site_name" content="ENTJ" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="ENTJ" />
  <meta name="twitter:description" content="ENTJ 개인 생산성 기록 앱" />
  <link rel="stylesheet" href="/src/styles/style.css" />
</head>

<body class="auth-loading">

  <section class="auth-screen" id="authScreen">
    <div class="auth-card">
      <div class="auth-logo">✓</div>
      <h1>ENTJ</h1>
      <p>이메일과 비밀번호로 가입하거나 로그인하면 내 기록을 어디서든 이어서 볼 수 있어요.</p>
      <div class="auth-form">
        <input type="email" id="authEmailInput" placeholder="이메일" autocomplete="email" />
        <input type="password" id="authPasswordInput" placeholder="비밀번호" autocomplete="current-password" />
        <input class="auth-signup-only" type="password" id="authPasswordConfirmInput" placeholder="비밀번호 확인" autocomplete="new-password" />
        <div class="auth-actions">
          <button class="auth-primary-btn" id="emailLoginBtn" type="button" disabled>로그인</button>
          <button class="auth-primary-btn auth-signup-only" id="emailSignupConfirmBtn" type="button" disabled>회원가입 완료</button>
          <button class="auth-secondary-btn" id="emailSignupModeBtn" type="button" disabled>회원가입</button>
          <button class="auth-secondary-btn auth-signup-only" id="emailLoginModeBtn" type="button" disabled>로그인으로</button>
        </div>
      </div>
      <div class="auth-divider"><span>또는</span></div>
      <button class="google-login-btn" id="googleLoginBtn" type="button" disabled>
        <span class="google-icon">G</span>
        Google로 계속하기
      </button>
      <p class="auth-message" id="authMessage">로그인 상태를 확인하는 중…</p>
    </div>
  </section>

  <header>
    <div class="header-top">
      <div class="date-display" id="dateDisplay">로딩 중…</div>
      <div class="motto-wrap">
        <span class="motto-label">나의 좌우명</span>
        <span class="motto-text placeholder" id="mottoDisplay" title="클릭해서 편집">좌우명을 입력하세요</span>
      </div>
      <div class="user-menu">
        <button class="logout-btn" id="logoutBtn" type="button">로그아웃</button>
      </div>
    </div>
    <nav class="tabs" id="tabsNav"></nav>
  </header>

  <main id="tabPanels"></main>

  <!-- ── 모달: To Do 추가 ── -->
  <div class="modal-overlay" id="todoModal">
    <div class="modal">
      <h3>할 일 추가</h3>
      <input type="text" id="todoInput" placeholder="오늘 할 일을 입력하세요" maxlength="80" />
      <div class="modal-actions">
        <button class="btn-cancel" id="todoCancelBtn">취소</button>
        <button class="btn-confirm" id="todoConfirmBtn">추가</button>
      </div>
    </div>
  </div>

  <!-- ── 모달: 매일 할 목록 추가 ── -->
  <div class="modal-overlay" id="dailyModal">
    <div class="modal">
      <h3>매일 할 항목 추가</h3>
      <input type="text" id="dailyInput" placeholder="예: 독서 30분, 운동, 물 2L 마시기" maxlength="80" />
      <div class="modal-actions">
        <button class="btn-cancel" id="dailyCancelBtn">취소</button>
        <button class="btn-confirm" id="dailyConfirmBtn">추가</button>
      </div>
    </div>
  </div>

  <!-- ── 모달: 목표 추가 ── -->
  <div class="modal-overlay" id="goalModal">
    <div class="modal">
      <h3>목표 추가</h3>
      <textarea id="goalInput" placeholder="이루고 싶은 목표를 적어보세요" maxlength="200" rows="3"></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" id="goalCancelBtn">취소</button>
        <button class="btn-confirm" id="goalConfirmBtn">추가</button>
      </div>
    </div>
  </div>

  <!-- ── 모달: 아이디어 추가 ── -->
  <div class="modal-overlay" id="ideaModal">
    <div class="modal">
      <h3>아이디어 추가</h3>
      <textarea id="ideaInput" placeholder="떠오른 아이디어를 적어보세요" maxlength="300" rows="3"></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" id="ideaCancelBtn">취소</button>
        <button class="btn-confirm" id="ideaConfirmBtn">추가</button>
      </div>
    </div>
  </div>

  <!-- ── 모달: 운동 기록 추가 ── -->
  <div class="modal-overlay" id="exerciseModal">
    <div class="modal">
      <h3>운동 추가</h3>
      <input type="hidden" id="exerciseTypeInput" value="strength" />
      <div class="exercise-type-selector">
        <button type="button" class="exercise-type-option active" data-exercise-type-option="strength">헬스</button>
        <button type="button" class="exercise-type-option" data-exercise-type-option="running">러닝</button>
        <button type="button" class="exercise-type-option" data-exercise-type-option="cycling">자전거</button>
        <button type="button" class="exercise-type-option" data-exercise-type-option="custom">기타</button>
      </div>
      <input type="text" id="exerciseNameInput" class="exercise-name-input" placeholder="운동 이름" maxlength="50" />
      <div class="modal-actions">
        <button class="btn-cancel" id="exerciseCancelBtn">취소</button>
        <button class="btn-confirm" id="exerciseConfirmBtn">추가</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="exerciseTimeModal">
    <div class="modal exercise-time-modal">
      <h3>운동 시간 선택</h3>
      <div class="exercise-time-wheel-wrap">
        <div class="exercise-time-wheel-column">
          <span class="exercise-time-wheel-label">시</span>
          <div class="exercise-time-wheel" id="exerciseHourWheel"></div>
        </div>
        <div class="exercise-time-wheel-column">
          <span class="exercise-time-wheel-label">분</span>
          <div class="exercise-time-wheel" id="exerciseMinuteWheel"></div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="exerciseTimeCancelBtn" type="button">취소</button>
        <button class="btn-confirm" id="exerciseTimeConfirmBtn" type="button">적용</button>
      </div>
    </div>
  </div>

  <!-- ── 모달: 탭 편집 ── -->
  <div class="modal-overlay" id="tabSettingsModal">
    <div class="modal">
      <div class="tab-settings-header">
        <h3>탭 편집</h3>
        <p class="tab-settings-hint">탭을 꾹 누르면 순서를 바꿀 수 있어요!</p>
      </div>
      <div class="tab-settings-list" id="tabSettingsList"></div>
      <div class="new-tab-row">
        <input type="text" id="newTabInput" placeholder="새 탭 이름" maxlength="24" />
        <button class="btn-confirm" id="newTabConfirmBtn" type="button">추가</button>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="tabSettingsCancelBtn" type="button">닫기</button>
        <button class="btn-confirm" id="tabSettingsDoneBtn" type="button">완료</button>
      </div>
    </div>
  </div>

  <!-- ── 모달: 블록 템플릿 ── -->
  <div class="modal-overlay" id="componentTemplateModal">
    <div class="modal">
      <h3>블록 추가</h3>
      <div class="component-template-list" id="componentTemplateList"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="componentTemplateCancelBtn" type="button">취소</button>
      </div>
    </div>
  </div>

  <!-- ── 모달: 블록 항목 추가 ── -->
  <div class="modal-overlay" id="blockItemModal">
    <div class="modal">
      <h3>할 일 추가</h3>
      <input type="text" id="blockItemInput" placeholder="오늘 할 일을 입력하세요" maxlength="80" />
      <div class="modal-actions">
        <button class="btn-cancel" id="blockItemCancelBtn" type="button">취소</button>
        <button class="btn-confirm" id="blockItemConfirmBtn" type="button">추가</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>

</body>

</html>
